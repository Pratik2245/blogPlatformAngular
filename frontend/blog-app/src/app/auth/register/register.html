<div class="auth-container">
    <div class="auth-card">

        <div class="text-center mb-4">
            <h1 class="brand">BlogSphere</h1>

            <p class="subtitle">
                Create your account and start blogging.
            </p>
        </div>

        <form (ngSubmit)="register()">

            <div class="mb-3">
                <label class="form-label">
                    Username
                </label>

                <input type="text" class="form-control" name="username" [(ngModel)]="username" placeholder="Username" />
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Email Address
                </label>

                <input type="email" class="form-control" name="email" [(ngModel)]="email" placeholder="Email" />
            </div>

            <div class="mb-4">
                <label class="form-label">
                    Password
                </label>

                <input type="password" class="form-control" name="password" [(ngModel)]="password"
                    placeholder="Password" />
            </div>

            <button class="btn btn-primary w-100">
                Register
            </button>
        </form>

        <div class="text-center mt-4">

            <p>
                Already have an account?

                <a routerLink="/login">
                    Login
                </a>
            </p>

        </div>

    </div>
</div>
