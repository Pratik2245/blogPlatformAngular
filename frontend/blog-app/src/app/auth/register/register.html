<div class="auth-container">
    <div class="auth-card">

        <div class="text-center mb-4">
            <h1 class="brand">BlogSphere</h1>

            <p class="subtitle">
                Create your account and start blogging.
            </p>
        </div>

        <form>

            <div class="mb-3">
                <label class="form-label">
                    Username
                </label>

                <input type="text" class="form-control custom-input" placeholder="Enter username" />
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Email Address
                </label>

                <input type="email" class="form-control custom-input" placeholder="Enter email" />
            </div>

            <div class="mb-4">
                <label class="form-label">
                    Password
                </label>

                <input type="password" class="form-control custom-input" placeholder="Create password" />
            </div>

            <button class="btn register-btn w-100">
                Create Account
            </button>

        </form>

        <div class="text-center mt-4">

            <p>
                Already have an account?

                <a routerLink="/login">
                    Login
                </a>
            </p>

        </div>

    </div>
</div>
